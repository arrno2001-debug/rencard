<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>張守仁 CHANG SHOU JEN | Digital Card</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #BF953F 0%, #FCF6BA 45%, #B38728 70%, #AA771C 100%);
            --matte-black: #121212;
            --accent-silver: #a8a8a8;
            --line-green: #06C755;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }

        body { background-color: #000; color: #fff; overflow-x: hidden; height: 100vh; }

        /* --- 開場動畫層 --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100dvh;
            background: #fff url('ren.jpg') center center / contain no-repeat;
            z-index: 2000;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .slide-up { transform: translateY(-100%); }

        /* --- 主容器 --- */
        .wrapper {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            padding: 20px;
        }

        .profile-card {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: var(--matte-black);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        .card-top-gold {
            background: var(--gold-gradient);
            height: 160px;
            padding-top: 45px;
            text-align: center;
            position: relative;
        }

        .name { font-size: 1.8rem; font-weight: 700; letter-spacing: 4px; color: #000; margin: 0; }

        .avatar-wrapper {
            position: absolute;
            bottom: -50px; left: 50%;
            transform: translateX(-50%);
            width: 110px; height: 110px;
            z-index: 5;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: top center;
            border: 4px solid var(--matte-black);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* 下方資訊區 */
        .card-bottom-info { padding: 65px 25px 40px; text-align: center; }

        .job-title {
            font-size: 0.9rem;
            color: #BF953F;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            margin-bottom: 25px;
            display: block;
        }

        .contact-list { margin-bottom: 30px; text-align: left; display: inline-block; }

        .contact-item {
            display: flex; align-items: center;
            margin-bottom: 12px; color: #ddd;
            text-decoration: none; font-size: 0.95rem;
        }

        .contact-item i { width: 30px; color: #BF953F; font-size: 1.1rem; }

        /* 按鈕區 */
        .cta-container { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 14px; border-radius: 4px; text-decoration: none;
            font-weight: 700; font-size: 0.9rem; transition: 0.3s;
        }

        .btn-line { background-color: var(--line-green); color: #fff; }
        .btn-call { border: 1px solid #fff; color: #fff; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn i { margin-right: 8px; font-size: 1.2rem; }

        /* 彈窗樣式 */
        #save-prompt {
            display: none;
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #BF953F;
            padding: 25px;
            width: 85%; max-width: 340px;
            z-index: 3000;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="intro-screen"></div>

    <div class="wrapper">
        <div class="profile-card">
            <div class="card-top-gold">
                <h1 class="name">張守仁</h1>
                <div class="avatar-wrapper">
                    <img src="arrno.jpg" alt="張守仁" class="avatar">
                </div>
            </div>

            <div class="card-bottom-info">
                <span class="job-title">CNC工程師 / CNC Programmer</span>

                <div class="contact-list">
                    <a href="tel:0961261096" class="contact-item">
                        <i class="fa-solid fa-mobile-screen"></i> 0961-261-096
                    </a>
                    <a href="mailto:arrno2001@gmail.com" class="contact-item">
                        <i class="fa-solid fa-envelope"></i> arrno2001@gmail.com
                    </a>
                    <a href="https://arrno2001-debug.github.io/rencard/" class="contact-item" target="_blank">
                        <i class="fa-solid fa-globe"></i> 個人數位名片
                    </a>
                </div>

                <div class="cta-container">
                    <a href="https://line.me/ti/p/3g2D0uhP7b" class="btn btn-line" target="_blank">
                        <i class="fa-brands fa-line"></i> 加入 LINE 諮詢
                    </a>
                    <a href="tel:0961261096" class="btn btn-call">
                        <i class="fa-solid fa-phone-flip"></i> 撥打電話
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="save-prompt">
        <p style="margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5;">
            需要儲存 <strong>張守仁</strong> 的<br>聯絡資訊至通訊錄嗎？
        </p>
        <div style="display: flex; gap: 10px;">
            <button onclick="downloadVCF()" style="flex: 1; padding: 12px; background: #BF953F; border: none; color: #000; font-weight: bold; cursor: pointer;">儲存</button>
            <button onclick="closePrompt()" style="flex: 1; padding: 12px; background: transparent; border: 1px solid #fff; color: #fff; cursor: pointer;">取消</button>
        </div>
    </div>

    <script>
    // --- 1. 時效性設定 ---
    // 設定名片的有效期限 (年, 月-1, 日)
    // 範例：2026年12月31日過期 (月份從0開始，11代表12月)
    const expiryDate = new Date(2026, 11, 31); 
    const today = new Date();

    window.addEventListener('load', () => {
        
        // --- 2. 時效性檢查 (最優先執行) ---
        if (today > expiryDate) {
            // 如果過期，直接覆蓋頁面內容並終止後續動畫
            document.body.innerHTML = `
                <div style="background:#000; color:#BF953F; text-align:center; padding:100px 20px; font-family:sans-serif;">
                    <i class="fa-solid fa-calendar-xmark" style="font-size:3rem; margin-bottom:20px;"></i>
                    <h2>此電子名片連結已失效</h2>
                    <p style="color:#fff; margin-top:10px;">請聯繫 張守仁 取得最新資訊</p>
                </div>`;
            return; 
        }

        // --- 3. 開場動畫 (1秒滑出) ---
        setTimeout(() => {
            const intro = document.getElementById('intro-screen');
            if(intro) intro.classList.add('slide-up');
        }, 1000);

        // --- 4. 15秒存檔詢問邏輯 ---
        // 檢查 LocalStorage 是否已經存過
        if (!localStorage.getItem('renVcfSaved')) {
            setTimeout(() => {
                const prompt = document.getElementById('save-prompt');
                if(prompt) prompt.style.display = 'block';
            }, 15000); 
        }
    });

    // --- 5. 儲存 VCF 功能 ---
    function downloadVCF() {
        const link = document.createElement('a');
        link.href = 'ren.vcf'; 
        link.download = 'ren.vcf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        localStorage.setItem('renVcfSaved', 'true');
        closePrompt();
    }

    function closePrompt() {
        document.getElementById('save-prompt').style.display = 'none';
    }
</script>
</body>
</html>
